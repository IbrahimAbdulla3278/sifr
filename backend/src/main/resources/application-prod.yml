spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  upload:
    dir: /var/data/uploads/images

logging:
  level:
    com.ecommerce: WARN
