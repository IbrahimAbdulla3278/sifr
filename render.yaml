services:
  - type: web
    name: sifr-ecommerce
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/ecommerce-backend-1.0.0.jar --spring.profiles.active=prod
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
    autoDeploy: true
